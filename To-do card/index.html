<!doctype html>
<html lang="en">
<href=>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo Card</title>
  <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <main class="page">
      <article class="todo-card" data-testid="test-todo-card" aria-labelledby="todo-title">
        <!-- HEADER -->
        <header class="todo-header">
          <input type="checkbox" id="todo-complete" data-testid="test-todo-complete-toggle" />

          <label for="todo-complete" class="visually-hidden">
            Mark task as completed
          </label>

          <h2 id="todo-title" data-testid="test-todo-title">
            Content creation
          </h2>
        </header>


        <p data-testid="test-todo-description">
          Shoot 15 Tiktok videos and also send them to the video editor for proper editing, and also post it on your
          Tiktok page.
        </p>


        <div class="meta">
          <span class="priority high" data-testid="test-todo-priority" aria-label="High Priority">
            High
          </span>

          <span class="status" data-testid="test-todo-status" aria-label="Task status">
            Pending
          </span>
        </div>


        <div class="dates">
          <div class="icon-container">
            <img class="icon" src="icons/calender icon.png" alt="">
          </div>
          <time datetime="2026-04-20T18:00:00Z" data-testid="test-todo-due-date">
            Due date : Apr 20, 2026
          </time>

          <time id="timeRemaining" aria-live="polite" data-testid="test-todo-time-remaining">
            Calculating...
          </time>
        </div>

        <!-- TAGS -->
        <ul class="tags" role="list" data-testid="test-todo-tags">
          <li data-testid="test-todo-tag-work">work</li>
          <li data-testid="test-todo-tag-urgent">urgent</li>
          <li>Content</li>
        </ul>

        <!-- ACTIONS -->
        <div class="actions">
          <button class="edit-button" data-testid="test-todo-edit-button" aria-label="Edit task">
            Edit
          </button>

          <button data-testid="test-todo-delete-button" aria-label="Delete task">
            Delete
          </button>
        </div>
      </article>
    </main>

    <script src="script.js"></script>
  </body>

</html>
